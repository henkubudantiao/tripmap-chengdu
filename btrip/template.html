function shopToggle(id,shops,title){
  let h=`<div class="shop-toggle" onclick="toggleShop('${id}')"><span>📍 ${title}（${shops.length}家）</span><span class="arrow">▸</span></div>`;
  h+=`<div class="shop-list" id="${id}">`;
  shops.forEach(s=>{
    h+=`<div class="shop-item"><div class="shop-name">${s.name}</div><div class="shop-desc">${s.desc}</div>`;
    if(s.quote)h+=`<div class="shop-quote">${s.quote}</div>`;
    if(s.dishes)h+=`<div class="dishes"><strong>🍽️ 推荐：</strong>${s.dishes}</div>`;
    if(s.url)h+=`<div class="xhs-link" onclick="event.stopPropagation();window.open('${xhsUrl(s.url)}')">📕 查看小红书原文</div>`;
    h+=`</div>`;
  });
  h+=`</div>`;
  return h;
}
function toggleShop(id){const el=document.getElementById(id);const t=el.previousElementSibling;el.classList.toggle('show');t.classList.toggle('open');}

// ════════ MAP ════════
const map=L.map('map',{center:[30.66,104.06],zoom:11,zoomControl:false});
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);

function icon(c,e){return L.divIcon({className:'',html:`<div style="width:26px;height:26px;border-radius:50%;background:${c};border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 2px 6px rgba(0,0,0,.18)">${e||''}</div>`,iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-14]})}

L.marker([HOTEL_BASE.lat,HOTEL_BASE.lng],{icon:icon('#ff9500','🏨'),zIndexOffset:1000}).addTo(map).bindPopup('<b>D1/D3/D4 酒店</b><br>市二医院/牛市口');
L.marker([HOTEL_D2.lat,HOTEL_D2.lng],{icon:icon('#ff9500','🏨'),zIndexOffset:1000}).addTo(map).bindPopup('<b>D2 酒店</b><br>都江堰南桥');

let markers=[],polylines=[];
const emojis={food:'🍽️',spot:'📍',hotel:'🏨',transport:'🚃',drink:'🍺'};
function clearMap(){markers.forEach(m=>map.removeLayer(m));polylines.forEach(p=>map.removeLayer(p));markers=[];polylines=[];}

function showDay(idx){
  clearMap();
  if(idx===0){const pts=[];DAYS.forEach(d=>d.locations.forEach(l=>{if(l.lat)pts.push([l.lat,l.lng])}));if(pts.length)map.fitBounds(pts,{padding:[30,30]});DAYS.slice(1).forEach(d=>{d.locations.filter(l=>l.time!=='—').forEach(l=>{const m=L.circleMarker([l.lat,l.lng],{radius:3.5,fillColor:d.color,color:'#fff',weight:1.5,fillOpacity:.9}).addTo(map).bindPopup('<b>'+l.name+'</b><br><span style="color:#86868b">'+d.label+'</span>');markers.push(m)})});return}
  const day=DAYS.find(d=>d.id===idx);if(!day)return;const coords=[];
  day.locations.forEach(l=>{if(!l.lat)return;const m=L.marker([l.lat,l.lng],{icon:icon(day.color,emojis[l.type]||'📌')}).addTo(map);m.bindPopup('<b>'+l.name+'</b>'+(l.time!=='—'?'<br><span style="color:#86868b">'+l.time+'</span>':'')+'<br>'+l.desc);markers.push(m);if(l.time!=='—')coords.push([l.lat,l.lng])});
  if(coords.length>1){const pl=L.polyline(coords,{color:day.color,weight:2.5,opacity:.4,dashArray:'6,5'}).addTo(map);polylines.push(pl)}
  if(coords.length)map.fitBounds(coords,{padding:[40,40],maxZoom:14});
}

// ════════ RENDER ════════
function locCard(loc,dayIdx){
  const dot=loc.type==='food'?'food':loc.type==='spot'?'spot':loc.type==='drink'?'drink':loc.type==='hotel'?'hotel':'transport';
  const bdg=loc.type==='food'?'<span class="badge food">餐</span>':loc.type==='spot'?'<span class="badge spot">景</span>':loc.type==='drink'?'<span class="badge drink">饮</span>':'';
  const uid='d'+dayIdx+'-'+loc.name.replace(/\W/g,'');
  let lnk='<button class="btn nav" onclick="openAS(\''+loc.name.replace(/'/g,"\\'")+'\','+loc.lat+','+loc.lng+')">📍 导航</button>';
  if(loc.xhs)loc.xhs.forEach(x=>{lnk+=xhsBtn(x.id,x.label)});
  
  let shopHtml='';
  if(loc.name.includes('芳华街')&&dayIdx===1)shopHtml=shopToggle('fh1',SHOPS.fanghua,'芳华街店铺推荐');
  if(loc.name.includes('芳草街'))shopHtml=shopToggle('fc1',SHOPS.fanghua,'芳草街店铺推荐');
  if(loc.name.includes('玉林综合市场'))shopHtml=shopToggle('ym',SHOPS.yulin_market,'玉林综合市场美食');
  if(loc.name.includes('玉林路')&&dayIdx===1)shopHtml=shopToggle('yl1',SHOPS.yulin_road,'玉林路店铺推荐');
  if(loc.name.includes('浣花溪'))shopHtml=shopToggle('hh',SHOPS.huanhua,'浣花溪公园');
  if(loc.name.includes('文化公园'))shopHtml=shopToggle('wh',SHOPS.wenhua,'文化公园');
  if(loc.name.includes('九眼桥')&&loc.type==='spot')shopHtml=shopToggle('jyq',SHOPS.jiuyanqiao,'九眼桥');
  if(loc.name.includes('芳华街')&&dayIdx===4)shopHtml=shopToggle('fh2',SHOPS.fanghua,'芳华街店铺推荐');
  if(loc.name.includes('玉林路')&&dayIdx===4)shopHtml=shopToggle('yl2',SHOPS.yulin_road,'玉林路店铺推荐');
  
  return `<div class="tl-item"><div class="tl-dot ${dot}"></div><div class="card" onclick="if(!event.target.closest('.btn,.links,.shop-toggle,.shop-list,.xhs-link'))toggle('${uid}')"><div class="time">${loc.time!=='—'?loc.time:'备选'}</div><div class="name">${bdg} ${loc.name}</div><div class="desc">${loc.desc}</div>${loc.budget?'<div class="budget">'+loc.budget+'</div>':''}<div class="links">${lnk}</div>${loc.detail?'<div class="details" id="'+uid+'">'+loc.detail.replace(/\n/g,'<br>')+'</div>':''}${shopHtml}</div></div>`;
}

function renderDay(idx){
  const d=DAYS.find(x=>x.id===idx);if(!d)return'';
  const main=d.locations.filter(l=>l.time!=='—');
  let h='<div class="day-head"><h2>'+d.title+'</h2><p>'+d.date+'</p></div>';
  if(d.id===1)h+='<div class="route-bar"><strong>路线：</strong>酒店 → 芳华街 → 芳草街 → 玉林综合市场 → 玉林路</div>';
  if(d.id===2)h+='<div class="route-bar"><strong>路线：</strong>犀浦站 → 都江堰景区 → 灌县古城 → 南桥</div>';
  if(d.id===3)h+='<div class="route-bar"><strong>路线：</strong>都江堰 → 三星堆 → 返回成都 → 九眼桥廊桥</div>';
  if(d.id===4)h+='<div class="route-bar"><strong>路线：</strong>酒店 → 浣花溪公园 → 文化公园 → 芳华街 → 玉林路</div>';
  if(main.length){h+='<div class="section-head">行程</div><div class="timeline">';main.forEach(l=>h+=locCard(l,idx));h+='</div>'}
  return h;
}

// ════════ NAV ════════
let cur=0;
const tabsEl=document.getElementById('tabs');
const contentEl=document.getElementById('content');
DAYS.forEach(d=>{const btn=document.createElement('button');btn.className='tab'+(d.id===0?' active':'');btn.dataset.day=d.id;btn.textContent=d.label;tabsEl.appendChild(btn)});

function go(idx){
  cur=idx;tabsEl.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',+t.dataset.day===idx));
  contentEl.innerHTML=idx===0?overviewContent():renderDay(idx);
  showDay(idx);contentEl.scrollTo({top:0});
  const tab=tabsEl.querySelector('[data-day="'+idx+'"]');if(tab)tab.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}
function toggle(id){const el=document.getElementById(id);if(el)el.classList.toggle('closed')}
tabsEl.addEventListener('click',e=>{const t=e.target.closest('.tab');if(t)go(+t.dataset.day)});
go(0);

// Action Sheet
const asOverlay=document.createElement('div');asOverlay.className='as-overlay';
asOverlay.innerHTML='<div class="as-sheet"><div class="as-group" id="as-opts"></div><div class="as-group"><button class="as-item as-cancel" onclick="closeAS()">取消</button></div></div>';
document.body.appendChild(asOverlay);asOverlay.addEventListener('click',e=>{if(e.target===asOverlay)closeAS()});
function openAS(n,lat,lng){const enc=encodeURIComponent(n);document.getElementById('as-opts').innerHTML='<button class="as-item" onclick="window.open(\'https://maps.apple.com/?q='+lat+','+lng+'&name='+enc+'\');closeAS()">🍎 Apple Maps</button><button class="as-item" onclick="window.open(\'https://uri.amap.com/marker?position='+lng+','+lat+'&name='+enc+'&src=trip&coordinate=wgs84&callnative=1\');closeAS()">🧭 高德地图</button><button class="as-item" onclick="window.open(\'https://map.baidu.com/search/'+enc+'\');closeAS()">🗺️ 百度地图</button>';asOverlay.classList.add('show')}
function closeAS(){asOverlay.classList.remove('show')}
</script>
