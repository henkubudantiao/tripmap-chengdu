var markers=[],polylines=[];
var emojis={food:"",spot:"",hotel:"",transport:"",drink:""};
function cm(){markers.forEach(function(m){map.removeLayer(m)});polylines.forEach(function(p){map.removeLayer(p)});markers=[];polylines=[];}

function sd(idx){
  cm();
  if(idx===0){
    var pts=[];
    DAYS.forEach(function(d){d.locations.forEach(function(l){if(l.lat)pts.push([l.lat,l.lng])})});
    if(pts.length)map.fitBounds(pts,{padding:[30,30]});
    return;
  }
  var day=DAYS.find(function(d){return d.id===idx});
  if(!day)return;
  var coords=[];
  day.locations.forEach(function(l){
    if(!l.lat)return;
    var m=L.marker([l.lat,l.lng],{icon:ic(day.color,emojis[l.type]||"")}).addTo(map);
    m.bindPopup("<b>"+l.name+"</b>"+(l.time!=="-"?'<br><span style="color:#86868b">'+l.time+"</span>":"")+"<br>"+l.desc);
    markers.push(m);
    if(l.time!=="-")coords.push([l.lat,l.lng]);
  });
  if(coords.length>1){
    var pl=L.polyline(coords,{color:day.color,weight:2.5,opacity:0.4,dashArray:"6,5"}).addTo(map);
    polylines.push(pl);
  }
  if(coords.length)map.fitBounds(coords,{padding:[40,40],maxZoom:14});
}

DAYS.forEach(function(d){var btn=document.createElement("button");btn.className="tab"+(d.id===0?" active":"");btn.dataset.day=d.id;btn.textContent=d.label;tabsEl.appendChild(btn)});

function go(idx){
  cur=idx;
  tabsEl.querySelectorAll(".tab").forEach(function(t){t.classList.toggle("active",+t.dataset.day===idx)});
  contentEl.innerHTML=idx===0?ov():rd(idx);
  sd(idx);
  contentEl.scrollTo({top:0});
  var tab=tabsEl.querySelector('[data-day="'+idx+'"]');
  if(tab)tab.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
}
function tg(id){var el=document.getElementById(id);if(el)el.classList.toggle("closed");}
tabsEl.addEventListener("click",function(e){var t=e.target.closest(".tab");if(t)go(+t.dataset.day)});
go(0);

var asO=document.createElement("div");
asO.className="as-overlay";
asO.innerHTML='<div class="as-sheet"><div class="as-group" id="as-opts"></div><div class="as-group"><button class="as-item as-cancel" onclick="cas()">取消</button></div></div>';
document.body.appendChild(asO);
asO.addEventListener("click",function(e){if(e.target===asO)cas()});

function oas(n,lat,lng){
  var enc=encodeURIComponent(n);
  document.getElementById("as-opts").innerHTML=
    '<button class="as-item" onclick="window.open(\'https://maps.apple.com/?q='+lat+","+lng+"&name="+enc+"');cas()\">Apple Maps</button>"+
    '<button class="as-item" onclick="window.open(\'https://uri.amap.com/marker?position='+lng+","+lat+"&name="+enc+"&src=trip&coordinate=wgs84&callnative=1');cas()\">高德地图</button>"+
    '<button class="as-item" onclick="window.open(\'https://map.baidu.com/search/'+enc+'\');cas()">百度地图</button>';
  asO.classList.add("show");
}
function cas(){asO.classList.remove("show");}
</script>
