    h+='<div class="shop-item"><div class="shop-name">'+s.name+'</div><div class="shop-desc">'+s.desc+"</div>";
    if(s.quote) h+='<div class="shop-quote">'+s.quote+"</div>";
    if(s.dishes) h+='<div class="dishes"><strong> 推荐：</strong>'+s.dishes+'</div>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

var markers=[],polylines=[];
var emojis={food:"",spot:"",hotel:"",transport:"",drink:""};
function cm(){markers.forEach(function(m){map.removeLayer(m)});polylines.forEach(function(p){map.removeLayer(p)});markers=[];polylines=[];}

function sd(idx){
  cm();
  if(idx===0){
    var pts=[];
    DAYS.forEach(function(d){d.locations.forEach(function(l){if(l.lat)pts.push([l.lat,l.lng])})});
    if(pts.length)map.fitBounds(pts,{padding:[30,30]});
    return;
  }
  var day=DAYS.find(function(d){return d.id===idx});
  if(!day)return;
  var coords=[];
  day.locations.forEach(function(l){
    if(!l.lat)return;
    var m=L.marker([l.lat,l.lng],{icon:ic(day.color,emojis[l.type]||"")}).addTo(map);
    m.bindPopup("<b>"+l.name+"</b>"+(l.time!=="-"?'<br><span style="color:#86868b">'+l.time+"</span>":"")+"<br>"+l.desc);
    markers.push(m);
    if(l.time!=="-")coords.push([l.lat,l.lng]);
  });
  if(coords.length>1){
    var pl=L.polyline(coords,{color:day.color,weight:2.5,opacity:0.4,dashArray:"6,5"}).addTo(map);
    polylines.push(pl);
  }
  if(coords.length)map.fitBounds(coords,{padding:[40,40],maxZoom:14});
}

:"🍵🍃本地人带去的，地道老成都松弛感茶馆","d":"本地朋友经常去的茶馆，要不是他带我去我应该找不到…不在景区，在草堂附近一个公园里，公园本身就很美了，古香古色的自然景观。这家是沿着河开的一家茶馆，去的时候基本都是本地人在喝茶打牌。\n\t\n如果想体验成都的松弛感，一定要来这边感受一下！\n\t\n点一份茶，瓜子，竟然还有我喜欢的怪味胡豆！可以坐一天，天气好的时候来晒太阳不知道有多惬意～\n\t\n🍵：浣花溪公园\n🕙：9:00-18:00\n🫖：人均30r\n\t\n#成","l":"630","k":"旷野小甜瓜","kw":"成都浣花溪公园喝茶"},{"id":"68899c38000000002501379a","t":"成都喝茶不用人挤人！","d":"看小红书推荐鹤鸣茶社，但是人很多\n本来在计划之内，被劝退了[汗颜R]\n但是我看大家拍的照片都很出片\n我们从杜甫草堂逛完出来步行到浣花溪公园\n发现里面这家茶馆太巴适咯～[棒R][棒R][棒R]\n这个地方是出租车师傅告诉我们的，说本地人爱去，到了之后果真如此。\n人少！临河！景色美！慢慢悠悠喝茶吹风，一坐就是三个小时。\n成都又打卡了一个好玩的地方～\n#城市找茶去[话题]# #一起喝茶聊天[话题]# #成","l":"590","k":"等等小楊羊🐏","kw":"成都浣花溪公园喝茶"},{"id":"67f22ebf000000001d01724e","t":"成都｜清风徐来，得闲饮茶","d":"好久没占到过川西茶廊河边位置了，今日幸运日lucky[仙女R] 总结下喝过的那些地，按个人喜爱度从高到低排序[偷笑R]：\n\t\n[向右R][向右R]首推川西茶廊（啜茗园）。\n\t\n1. 川西茶廊：紧邻杜甫草堂的浣花溪公园内。沿清水河视野开阔，绿木为蓬。适合享受自然放空闲聊的地方，每次来成都都要特意来这度过几个下午才舒服，至今最爱茶廊没有之一❗️\n\t\n2. 陈锦茶铺：铁像寺附近。与其它公园等地方完全不同","l":"448","k":"daxidilin","kw":"成都浣花溪公园喝茶"},{"id":"671fac6c0000000021003871","t":"📍成都｜杜甫草堂旁边的小众茶馆—川西茶廊","d":"人民公园那边人太多了 这家浣花溪公园里的川西茶廊就很不错 可以和杜甫草堂安排在一起\n\t\n定位到浣花溪公园南门走进去近一些（我们选错门了走了二十分钟）\n\t\n普通的茶基本都是20-30 不喜欢喝茶的可以试试飘雪 花香重一些 不是那么苦\n\t\n溪边的位置去的晚不一定有要看运气 可以早点去早上七八点开始营业\n\t\n太阳好的时候真的很出片 旁边小溪波光闪闪的 晒着太阳很舒服 拍完照还可以和旁桌的叔叔阿姨聊聊天 ","l":"368","k":"圆湘琴","kw":"成都浣花溪公园喝茶"},{"id":"67c3eda30000000009017d60","t":"成都家人们进","d":"成都哪个公园喝茶性价比高呢？目前在人民公园，浣花溪公园咋样呀求推荐#成都公园喝茶[话题]#","l":"307","k":"小红薯5F7B2702","kw":"成都浣花溪公园喝茶"},{"id":"69f2b819000000001a02cfdf","t":"一点都不想离开成都","d":"此刻在浣花溪公园坐着喝茶\n我真的能在这里发一整天的呆\n\t\n成都给我的感觉是\n好吃好吃好吃\n辣不到我一点\n依然十分通畅[doge]\n生活节奏巴适\n物价也是友好\n旅行到目前为止最喜欢的城市了\n\t\n可以舒舒服服地放空  谁也卷不到我\n不想回去工作了[完啦R][完啦R]\n#下次还要来[话题]# #疲惫生活里的解药[话题]# #成都[话题]#","l":"168","k":"小肥崽超能吃","kw":"成都浣花溪公园喝茶"},{"id":"68bab59b000000001d034111","t":"来成都一定要去浣花溪公园！太舒服辣！🤤","d":"来成都前听只说过人民公园\n后面觉得路程太远就没有去😶‍🌫️\n但是我和朋友都超爱逛公园的！\n于是随便去了一家公园！⛲️\n超舒服超幸福环境巨好阳光巨好随随便便也可出片！☀️\n走累了可以和朋友一起去小溪旁的茶室喝喝茶聊聊天！👩‍❤️‍💋‍👩\n还有凉粉甜水面好多好多成都特色小食🍜🫖☕️\n人生就是爽爽爽！👭\n生活就是雅雅雅！🪺\n#公园城市幸福成都[话题]# #逛公园[话题]# #柳浪闻莺徒步[话题]# #人","l":"138","k":"找事小子","kw":"成都浣花溪公园喝茶"},{"id":"67ac5e68000000001703ba57","t":"成都｜市内坝坝茶公园合集(附保姆级攻略)❗️","d":"大家好我是@一个张张包\n更多小众有趣的游记攻略都在主页,大家可以蹲住,我会为大家带来更多精彩的内容🧡🧡🧡\n\t\n本期给大家整理了关于成都市内最巴适且超级出片的几个可以喝坝坝茶的公园,这些公园也是最能体现成都悠闲生活的地方[偷笑R]\n\t\n1、文化公园,位于青羊区琴台路73号\n公园很大也可以在湖边喝茶，最便宜的才10块钱一杯,还有盒饭套餐可以组合消费,共计20元/人茶和盒饭\n\t\n2、铁像寺水街,位于武侯","l":"129","k":"暴走小荔枝～","kw":"成都浣花溪公园喝茶"},{"id":"6a2236f20000000036000767","t":"失业喝茶日记9——浣花溪公园坝坝茶","d":"朋友失业一年多天天在家，E人快成I人了，自己上个月工作也停了，两个中年美女开启喝茶生活。\n第9站：浣花溪公园坝坝茶\n花毛峰12块\n浣花溪公园是很多年前去过，这个环境我感觉成都其他公园都达不到。本计划去一家坝坝茶，随意来到岛上发现了这家，环境太棒了。室内室外都很好，室内拍照出片，室外有群鸟齐飞，松鼠树上乱窜，绿树成荫，和朋友放起宫崎骏动画的钢琴曲，愉快幽静的睡了一下午，可惜5点要关门，不然我们能坐到","l":"114","k":"太阳","kw":"成都浣花溪公园喝茶"},{"id":"68765b8a0000000012033830","t":"☔️浣花溪公园听雨喝茶，成都人太会生活了！","d":"🌧 雨天浣花溪\n谁说晴天才是喝茶好时节？雨中的浣花溪才是隐藏的宝藏！  细雨轻敲溪面，廊檐水滴成帘，满园绿意被洗得发亮，坐在茶廊里捧一杯热茶——这才是成都慢生活的天花板！\n🍵 选茶\n18-40元左右都有，飘雪、毛峰、普洱、菊花（嬢嬢现拆包装给你跑到盖碗里），再花12买包瓜子坐一整天！（也可自带）\n📍 私藏茶座：川西茶廊\n紧邻溪边，竹椅排开，头顶老榕树遮雨，耳畔是雨打溪流的白噪音，人均15-25元性","l":"95","k":"酸酸团长","kw":"成都浣花溪公园喝茶"},{"id":"6a0c6adf00000000350224f7","t":"这才是成都茶馆的正确打开方式啊","d":"不想去人民公园鹤鸣茶社人挤人的话，就来浣花溪公园啜茗园（原川西茶廊）吧，巴适得很～\n#茶馆[话题]# #盖碗茶[话题]# #成都茶馆[话题]# #出门吃茶去[话题]# #川西茶廊[话题]# #浣花溪公园[话题]# #慢生活[话题]# #茶系慢生活[话题]# #成都旅游攻略[话题]# #好视频扶持计划[话题]#","l":"83","k":"Seeing","kw":"成都浣花溪公园喝茶"},{"id":"69e483b6000000001a031b9b","t":"想遛娃户外，又怕晒太阳，必须来这个公园","d":"先说重点：这里树荫超多，夏天带娃完全不晒！超级多的凉亭！\n缺点：没有太多露营的地方\n\t\n📍浣花溪（我爸妈住双楠，以前跑步天天这里)\n☀️又可以晒太阳（想补钙就找块有阳光的草坪)\n🍵两个喝茶的地方（都是20多一杯）：\n1️⃣ 进门口 「知竹吧」，坝子还是有点晒，没多少树荫\n2️⃣ 往前走靠河边的 「川西茶廊」 ——想更凉快就选这个，靠河边，有树荫\n\t\n👨‍👩‍👧带2岁女儿的真实玩法：\n她特别喜欢去 ","l":"60","k":"君君呀","kw":"成都浣花溪公园喝茶"},{"id":"691ef9fe000000001e02b41d","t":"秋冬喝茶好去处","d":"秋冬喝茶好去处：浣花溪公园悠闲半日指南\n今天给大家推荐一个适合秋冬季节，能和朋友喝茶的好地方——浣花溪公园。喝茶、晒太阳、散步，感受老成都的慢生活。\n交通非常便利：\n• 自驾： 直接导航“浣花溪公园南门”，从公园大门进去，左手边就是地下停车场，停车方便。\n• 地铁： 可以乘坐地铁17号线，在浣花里D口下车。有个小窍门：从地铁站出来后，可以直接从四川省（草堂院区） 内部穿行，出来便是浣花溪公园的南大","l":"49","k":"武小妹","kw":"成都浣花溪公园喝茶"},{"id":"69d0d7760000000023025ddc","t":"存一些春天逛公园喝茶拍照姿势📷🌿附地址","d":"春天逛公园这样拍太有氛围感啦～\n坐在河边喝茶吹风太惬意了\n📍：浣花溪公园（南门进左边直走）➡️川西茶廊\n#来拍照了[话题]# #拍照姿势不重样[话题]# #拍照姿势[话题]# #一起逛公园吧[话题]# #一起去公园吸氧[话题]# #大自然拍照氛围感[话题]# #春天拍照[话题]# #公园拍照姿势[话题]# #踏青[话题]# #一起去踏青[话题]#","l":"37","k":"llli喵喵","kw":"成都浣花溪公园喝茶"},{"id":"65310c05000000002402dc2f","t":"喝茶打牌好去处·成都浣花溪公园的坝坝茶","d":"环境很舒服，靠着河边\n喝点茶，打点牌，吃点吃瓜\n享受着浣花溪公园的清晰空气\n附近还有杜甫草堂文化气息底蕴\n可真好啊，真是去四川博物馆、杜甫草堂、青羊宫、浣花溪公园的好出去\n我们人不够，临时拉了旁边的喝茶一起打牌\n简直不要惬意的很😌\n#茶馆[话题]# #青羊宫喝茶[话题]# #四川博物馆喝茶[话题]# #杜甫草堂喝茶[话题]# #成都[话题]# #拍照[话题]# #人文景点分享[话题]#","l":"34","k":"joise学习站","kw":"成都浣花溪公园喝茶"},{"id":"69e45eb50000000023014a40","t":"成都公园喝茶🍵","d":"😊今天起早来了浣花溪公园，这个公园很适合跑步散步，空气好还有亭子走累了可以坐，但是本人没有找到入口[石化R]公园旁边还有一侧入口也有亭子和步行道。\n💕这个公园的茶社以前叫川西茶廊，地图上也是这个没改，但是牌匾和茶碗改成了啜茗园。在西门和南门中间那里，挺好找的随便走一走就碰见了\n靠河的位置景色是真不错啊[萌萌哒R]周末的早上也没几个人。\n😱来之前看到有人说烟味儿，加上之前在别的茶社也是被二手烟攻击了","l":"26","k":"舞九尾","kw":"成都浣花溪公园喝茶"},{"id":"69f4ac4e000000002003bbc7","t":"成都旅拍｜五一不排队不挤人的宝藏喝茶地🍵","d":"哈喽大家👋🏻\n这里是带大家逛成都拍美照吃美食的成都本地小灵通➕拍照小能手倩倩宝儿🥳\n\t\n-\n不得不说 鹤鸣那边人真的太多了！！\n给大家分享我的宝藏喝茶地！都是成都本地人！性价比也很nice！重点是很出片！！\n\t\n📍川西茶廊\n就在浣花溪公园里面，杜甫草堂旁边，逛完杜甫草堂就出来喝茶🍵成都人民慢生活节奏拿捏👌\n\t\n-\n最近还有🈳\n欢迎大家找我📸玩儿～\n\t\n🙋🏻‍♀️\n关于倩倩\nenfp快乐小狗🐶成都本","l":"21","k":"倩倩宝儿📸","kw":"成都浣花溪公园喝茶"},{"id":"6804c798000000000b02f312","t":"别挤人民公园啦，这里喝茶不香吗","d":"怕挤的别再去人民公园啦，文化公园是个好选择，这里以本地人居多，打牌喝茶聊天超级悠闲的生活，文化公园很安静，夏天可以边喝茶边赏荷花，冬天可以看黑天鹅，这才是惬意的慢生活！\n📍文化公园：地铁青羊宫站C出口，里面有好几家茶室，支叽茶馆，凤林苑茶园，三月茶室等\n一杯茶15～20元，花生10元，香瓜子10元很平价。\n#成都[话题]##成都喝茶推荐[话题]# #文化公园[话题]##成都茶馆[话题]##成都[话","l":"127","k":"一抹绿香","kw":"成都文化公园喝茶"},{"id":"69169b45000000000402ba6b","t":"成都喝茶别再挤人民公园啦！","d":"成都的秋天终于有氛围感了！\n不想去人民公园人挤人？\n青羊宫地铁口出来直接冲「文化公园·三月茶社」！\n一进院就是满眼的绿植+秋日暖炉\n连小猫都爬到瓦屋顶上“凑热闹”（真·上房揭瓦实锤🤣）\n点上一壶茶+烤年糕/橘子/花生\n穿个温柔的浅色系外套往这儿一坐\n随便拍都是“秋日氛围美人”既视感📸\n（PS：烤东西的时候盯紧点！不然就变黑乎乎😅）\n不用专门找机位，院子里的竹椅、暖炉、树叶，甚至屋顶的小猫都是天然布","l":"119","k":"小哇W","kw":"成都文化公园喝茶"},{"id":"6826b9a20000000023015098","t":"外地人来成都一定要去一次文化公园！！！！","d":"大家好呀，我是霉霉～\n\t\n大家来成都不要只知道人民公园了，建议你留一天时间给成都本地人最喜欢去的文化公园\n\t\n文化公园作为成都老牌公园之一，也是和人民公园不相上下的存在，地道的本地人都更喜欢来这里聊天喝茶，一呆就是一整天\n\t\n你想要在人民公园鹤鸣茶社体验到的川剧变脸、采耳、盖碗茶、听评书、长嘴壶表演等成都悠闲生活，文化公园里面的三月茶社也能给足你体验感～\n\t\n真的不要再去人挤人的地方了，相比鹤鸣茶","l":"105","k":"霉霉在路上","kw":"成都文化公园喝茶"},{"id":"6a1eca2400000000370374bf","t":"成都文化公园荷花","d":"夏日限定赏荷花配小茶馆，超级悠闲自在的一天。\n个人感觉文化公园比荷花更值得宣传的是茶馆\n10元的茶和10元的盒饭就可以闲着待一天。\n在买束9.9的荷花超高性价比！\n\t\n地铁青羊宫c口出\n\t\n#荷花[话题]#","l":"85","k":"酒酒奈子🦋","kw":"成都文化公园喝茶"},{"id":"683eda3b000000002202f4cd","t":"成都夏日赏荷花 | 文化公园喝坝坝茶好巴适","d":"小荷才露尖尖角～湖边的位置靠近荷花池真的好美啊，一杯茶15-25元左右，坐一下午好舒服。#荷花拍照[话题]# #荷塘美景如诗如画[话题]# #成都荷花[话题]# #成都赏荷花[话题]# #文化公园荷花[话题]# #成都荷花拍照[话题]# #成都周末去哪儿[话题]# #荷花盛开如此美丽[话题]# #小荷才露尖尖角[话题]# #文化公园喝茶[话题]#","l":"66","k":"巴菲特女孩儿","kw":"成都文化公园喝茶"},{"id":"66af4de10000000005021680","t":"盛夏 锦官雨落 『支矶茶园』","d":"『成都公园——茶馆推荐』\n《文化公园——支矶茶园》一家本地人会来的茶园\n一点一滴，淅淅沥沥\n落在支矶茶园的莲叶\n🚌地铁『青羊宫』站C口出，沿P7箭头一直往里走，里面有好几家茶园，有在『荷花』池旁的，有在『睡莲』边上的，建议实地看看选喜欢的。\n🍵随便选了那家睡莲边上的\n％💰：15r/人喝茶最低消，+10r手搓🀄在池塘边（慢节奏体验感），+40r机麻（室内空调房）。\n％红：夏日雨天在莲池边喝茶聊天，搓","l":"48","k":"逍Wooh","kw":"成都文化公园喝茶"},{"id":"6a194eed000000003502bad4","t":"5.29实拍！成都第一波荷花美哭了🪷地铁直达","d":"文化公园的第一波荷花\n半开半合那一秒，整个初夏都被框进镜头📸\n不用滤镜，手机直出就是壁纸。\n✅ 目前实况\n最里面的湖开得最好（桥两边），外面湖还要等一两周。\n最早那波已经结小莲蓬了，超可爱！\n✅ 园内附赠\n睡莲｜蓝花楹｜绣球｜蜀葵\n湖边一圈老茶棚，喝茶赏花，成都味儿拉满🍵\n✅ 拍荷Tips\n▫️上午8-10点，花最精神，光线最柔\n▫️穿新中式或浅色裙子，绝配\n▫️一定带驱蚊水，蚊子超爱荷花池\n📍成","l":"46","k":"乔霏儿","kw":"成都文化公园喝茶"},{"id":"69cef21b00000000230253a9","t":"成都坝坝茶地点合集来啦！！！！附详细攻略","d":"大家好，我是热爱生活的@霉霉在路上\n春天在成都\n最安逸的事就是带上一家老小\n找个有太阳、有茶香、有红灯笼的坝子\n泡杯盖碗茶，嗑着瓜子摆龙门阵\n\t\n别再往商圈挤了!!!\n这8个我亲测过、适合家庭聚会的喝茶公园\n从老成都烟火气到清幽人文风\n全都安排明白👇\n\t\n1️⃣ 人民公园 · 鹤鸣茶社\n📍地铁2号线人民公园站B口\n⏰9:00-21:00  💰24-50/人\n\t\n2️⃣ 文化公园 · 枕流茶社\n📍地","l":"45","k":"霉霉在路上","kw":"成都文化公园喝茶"},{"id":"67adae1b0000000029036ab9","t":"📍成都 听劝去了文化公园🍵","d":"p1-p4公园里的花都开好了，桃花缤纷\n桃花树下喝茶啃瓜子聊天，真的一下子感觉退休了。就是这里只有品茶，瓜子花生，广东人有点不惯，如果可以点翻两笼虾饺烧卖就好了😂\n还有这里的麻将桌还是电动的，旁边写着118四杯茶四个盒饭开桌打麻将。离开的时候刚好看到大家捧着不锈钢餐盘打饭。\np5买到了会上下动的熊猫冰箱贴，就是有点大\np6-p8吃到了好吃的蛋烘糕！！\n#公园城市幸福成都[话题]# #春天就要逛公园","l":"37","k":"酱油饭团加辣白菜","kw":"成都文化公园喝茶"},{"id":"691ae115000000000d03a771","t":"在成都,本地人不愿意公开的公园❗️❗️附攻略","d":"大家好,我是@一个张张包\n更多小众有趣的游记攻略打卡地都在主页🧡🧡🧡\n\t\n不知不觉张张包已经快两个月没有认真写过攻略了,这两个月里也很少去徒步和打卡景点了,主要是暑假实在是太累了再加上近期事情也比较多哈哈哈哈,所以还请我的互联网姐妹们原谅我,当然也希望你们能督促我❤️\n\t\n周末本来打算出去徒步,因为遇到秋假所以就没有出发,周末两天所以就在市区转了两天,今天就给大家发点文化公园的攻略吧👇\n\t\n可真别","l":"36","k":"暴走小荔枝～","kw":"成都文化公园喝茶"},{"id":"69de107600000000230129c2","t":"成都公园坝坝茶🍵三月茶社太安逸了","d":"在文化公园里的宝藏茶社\n闹中取静的四合院🌿\n青瓦绿植、竹椅木桌\n点壶水果茶，几十块钱还配小吃，几个人耍一下午\n和朋友摆龙门阵、搓麻将🀄️\n安静又舒服\n老成都的松弛感在这里体现得淋漓尽致\n喝茶、晒太阳、唠嗑、斗地主\n这才是打开老成都下午茶的正确方式\n📍三月茶社（文化公园内）\n#成都坝坝茶[话题]##成都下午茶[话题]# #成都喝茶好去处[话题]#\n#三月茶社[话题]# #成都周末去哪儿[话题]# #","l":"34","k":"&宝藏猪猪🐷","kw":"成都文化公园喝茶"},{"id":"69b35188000000001d013be1","t":"成都本地人绝不告诉你的宝藏公园天花板💯","d":"​✨别再只挤人民公园了！成都市中心藏着一个免费人少、四季有花、喝茶拍照两不误的宝藏公园～\n🌟【实用信息】\n📍地址：青羊区一环路西二段7号\n🚇交通指南：\n地铁直达：5/13号线青羊宫站C口\n公交路线：27/42/58/59路到青羊宫站\n​\n📸【核心打卡路线】（不走回头路）\n地铁青羊宫站→文化公园南门花海→连环画之家→青莲茶社→儿童乐园→十二桥烈士墓→浮雕墙→聆琴园→支矶湖→八角亭→东门出→琴台路\n👉","l":"29","k":"城邦旅行记","kw":"成都文化公园喝茶"},{"id":"6a211eed000000003601c395","t":"成都文化公园｜🌸荷花正值盛花期","d":"📍成都文化公园\n🕒荷花最佳观赏期：现在！正值盛花期\n\t\n📸拍荷花\n我是从琴台路这边的东大门进去的\n一进门正对湖心岛，岛上已经开满了荷花～\n虽然有点背光，但荷花本身出彩🌿\n📌建议时间：\n· 早上8:00-10:00\n· 下午4:00-6:00\n光线柔和，人也相对少\n\t\n我去的时候，湖心岛周围全是拿着长枪短炮的叔叔阿姨\n果然，又到了一年一度拍荷花的季节📷\n\t\n🍵5元早茶，喝到就是赚到\n文化公园——被茶","l":"28","k":"社恐的短途旅行日记","kw":"成都文化公园喝茶"},{"id":"68fd7451000000000402be8f","t":"成都文化公园喝茶～巴适","d":"成都喝茶不只有鹤鸣和金琴。强烈推荐成都文化公园～这里毗邻青羊宫、杜甫草堂等景点，游玩这些景点后，可留半天时间在公园。非常适合有老人小孩的家庭游玩，一应俱全。即使旺季，也没其他茶馆喧嚣吵闹的氛围。\n公园主要有两个常用出入口：南门（正门） 和西门。\n·南门（正门/一号门）：面向青羊宫，是公园最主要、最宽敞的入口。如果是第一次来，建议从这个门进入。路上会遇到户外游乐园，带小朋友的游客，还可以在此溜娃～\n","l":"27","k":"吃辣椒长大的剁椒鱼头","kw":"成都文化公园喝茶"},{"id":"6a224b210000000037034783","t":"6月必去｜老成都私藏荷池，喝茶逛园一站式","d":"📍成都文化公园东门\n🚇5或13号线青羊宫C口步行5分钟到正门\n2号线 通惠门A口 步行8分钟到东门\n🎫免费\n花期6-8月，现在正值盛花期，45种精品荷，稀有太空荷花超好拍\n\t\n最佳游玩时间：\n早上7:30-10:00\n荷叶带晨露，人少光线柔和。\n\t\n傍晚17:30-19:00\n落日倒影，荷叶鎏金，氛围感封神。\n\t\n老成都慢生活：\n逛累了坐湖边竹椅，一碗盖碗茶一盘小吃吹吹荷风。\n带娃里面有喂兔子，喂","l":"23","k":"翻糖糖","kw":"成都文化公园喝茶"},{"id":"69db1647000000001f0039bf","t":"🍵成都品茶 文化公园这家茶馆值得一去！！","d":"成都文化公园三月茶社一家藏在公园里的成都慢生活天花板✨\nㅤ\n周末和朋友逛公园意外发现的一家茶馆，青瓦白墙的中式小院太绝了！环境清幽，拍照也很出片！！\n🍵茶品选择很多，我们点了水果茶，清爽解腻配搭点小吃，边嗑瓜子边喝茶，一下午都不会无聊。一坐下就感觉整个人都慢下来了，静下来享受属于周末的悠闲时光。\nㅤ\n👯无论是本地朋友还是外地朋友，都很适合来这儿喝茶聊天感受成都安逸生活。\n\t\n#得闲饮茶去[话题]#","l":"21","k":"熙茵心","kw":"成都文化公园喝茶"},{"id":"6a23d4b000000000160276f2","t":"成都！适合一个人闲逛的100个地方 （8/100）","d":"闲来无事去文化公园赏荷，🍵喝茶、嗑瓜子、赏荷、看睡莲、天鹅…还有画画写真的，真的好惬意啊！走的时候还可以9.9r抱一束荷花！\n.\n👉公园主要是赏荷花、喝茶打牌，买壶茶坐一下
