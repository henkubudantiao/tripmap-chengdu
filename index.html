function copyText(t){navigator.clipboard.writeText(t).then(()=>{const el=document.getElementById('toast');el.textContent='已复制 ✓';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000)})}
function shopToggle(id,shops,title){
  let h=`<div class="shop-toggle" onclick="toggleShop('${id}')"><span>📍 ${title}（${shops.length}家）</span><span class="arrow">▸</span></div><div class="shop-list" id="${id}">`;
  shops.forEach(s=>{
    h+=`<div class="shop-item"><div class="shop-name">${s.name}</div><div class="shop-desc">${s.desc}</div>`;
    if(s.quote)h+=`<div class="shop-quote">${s.quote}</div>`;
    if(s.dishes)h+=`<div class="dishes"><strong>🍽️ 推荐：</strong>${s.dishes}</div>`;
    if(s.url)h+=`<div class="xhs-link" onclick="event.stopPropagation();window.open('${xhsUrl(s.url)}')">📕 查看小红书原文</div>`;
    h+=`</div>`;
  });
  return h+`</div>`;
}

<div class="card" onclick="go(2)"><div class="name"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#007aff;margin-right:5px"></span>D2 · 都江堰</div><div class="desc">水利工程→灌县古城→南桥蓝眼泪</div></div>
<div class="card" onclick="go(3)"><div class="name"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#af52de;margin-right:5px"></span>D3 · 三星堆+九眼桥</div><div class="desc">古蜀文明→返回成都→九眼桥廊桥夜景</div></div>
<div class="card" onclick="go(4)"><div class="name"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#34c759;margin-right:5px"></span>D4 · 喝茶+玉林</div><div class="desc">浣花溪公园→文化公园→芳华街→玉林路</div></div>

${shopToggle('xhs_all',[
  {name:'成都玉林路美食三刷全攻略',desc:'❤️ 6863赞',url:'6784dd5b000000000b0209ce'},
  {name:'成都芳草街！！人均60➕的穷鬼漂亮饭！！！',desc:'❤️ 4940赞',url:'66d09985000000001d0392ca'},
  {name:'成都夜游citywalk，望平街-九眼桥超详细攻略',desc:'❤️ 4697赞',url:'67501d50000000000201a01b'},
  {name:'成都，你心中TOP1的串串店是哪家？',desc:'❤️ 4531赞',url:'628323f40000000001028405'},

  {name:'成都玉林路📍砂锅串串大王👑',desc:'❤️ 3627赞',url:'696bacfd000000002203bafe'},
  {name:'不要让我求你们去玉林菜市好吗',desc:'❤️ 3457赞',url:'642075bc0000000011012a4a'},

],'全部高赞笔记')}`;
}
const map=L.map('map',{center:[30.66,104.06],zoom:11,zoomControl:false});
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
function icon(c,e){return L.divIcon({className:'',html:`<div style="width:26px;height:26px;border-radius:50%;background:${c};border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 2px 6px rgba(0,0,0,.18)">${e||''}</div>`,iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-14]})}
L.marker([HOTEL_BASE.lat,HOTEL_BASE.lng],{icon:icon('#ff9500','🏨'),zIndexOffset:1000}).addTo(map).bindPopup('<b>D1/D3/D4 酒店</b><br>市二医院/牛市口');
L.marker([HOTEL_D2.lat,HOTEL_D2.lng],{icon:icon('#ff9500','🏨'),zIndexOffset:1000}).addTo(map).bindPopup('<b>D2 酒店</b><br>都江堰南桥');
let markers=[],polylines=[];
const emojis={food:'🍽️',spot:'📍',hotel:'🏨',transport:'🚃',drink:'🍺'};
function clearMap(){markers.forEach(m=>map.removeLayer(m));polylines.forEach(p=>map.removeLayer(p));markers=[];polylines=[];}
function showDay(idx){
  clearMap();
  if(idx===0){const pts=[];DAYS.forEach(d=>d.locations.forEach(l=>{if(l.lat)pts.push([l.lat,l.lng])}));if(pts.length)map.fitBounds(pts,{padding:[30,30]});DAYS.slice(1).forEach(d=>{d.locations.forEach(l=>{if(l.lat){const m=L.circleMarker([l.lat,l.lng],{radius:3.5,fillColor:d.color,color:'#fff',weight:1.5,fillOpacity:.9}).addTo(map).bindPopup('<b>'+l.name+'</b><br>'+d.label);markers.push(m)}})});return}
  const day=DAYS.find(d=>d.id===idx);if(!day)return;const coords=[];
  day.locations.forEach(l=>{if(!l.lat)return;const m=L.marker([l.lat,l.lng],{icon:icon(day.color,emojis[l.type]||'📌')}).addTo(map);m.bindPopup('<b>'+l.name+'</b><br>'+l.time+'<br>'+l.desc);markers.push(m);if(l.time!=='—')coords.push([l.lat,l.lng])});
  if(coords.length>1){polylines.push(L.polyline(coords,{color:day.color,weight:2.5,opacity:.4,dashArray:'6,5'}).addTo(map))}
  if(coords.length)map.fitBounds(coords,{padding:[40,40],maxZoom:14});
}
function locCard(loc,dayIdx){
  const dot=loc.type==='food'?'food':loc.type==='spot'?'spot':loc.type==='drink'?'drink':loc.type==='hotel'?'hotel':'transport';
  const bdg=loc.type==='food'?'<span class="badge food">餐</span>':loc.type==='spot'?'<span class="badge spot">景</span>':loc.type==='drink'?'<span class="badge drink">饮</span>':'';
  const uid='d'+dayIdx+loc.name.replace(/\W/g,'');
  let lnk='<button class="btn nav" onclick="event.stopPropagation();openAS(\''+loc.name.replace(/'/g,"\\'")+'\','+loc.lat+','+loc.lng+')">📍 导航</button>';
  if(loc.xhs)loc.xhs.forEach(x=>{lnk+=xhsBtn(x.id,x.label)});
  let shopHtml='';
  if(loc.name.includes('芳华街')&&dayIdx===1)shopHtml=shopToggle('fh1',SHOPS.fanghua,'芳华街店铺');
  if(loc.name.includes('芳草街'))shopHtml=shopToggle('fc1',SHOPS.fanghua,'芳草街店铺');
  if(loc.name.includes('玉林综合市场'))shopHtml=shopToggle('ym',SHOPS.yulin_market,'玉林综合市场美食');
  if(loc.name.includes('玉林路')&&dayIdx===1)shopHtml=shopToggle('yl1',SHOPS.yulin_road,'玉林路店铺');
  if(loc.name.includes('浣花溪'))shopHtml=shopToggle('hh',SHOPS.huanhua,'浣花溪公园');
  if(loc.name.includes('文化公园'))shopHtml=shopToggle('wh',SHOPS.wenhua,'文化公园');
  if(loc.name.includes('九眼桥')&&loc.type==='spot')shopHtml=shopToggle('jyq',SHOPS.jiuyanqiao,'九眼桥');
  if(loc.name.includes('芳华街')&&dayIdx===4)shopHtml=shopToggle('fh2',SHOPS.fanghua,'芳华街店铺');
  if(loc.name.includes('玉林路')&&dayIdx===4)shopHtml=shopToggle('yl2',SHOPS.yulin_road,'玉林路店铺');
  return `<div class="tl-item"><div class="tl-dot ${dot}"></div><div class="card" onclick="toggle('${uid}')"><div class="time">${loc.time}</div><div class="name">${bdg} ${loc.name}</div><div class="desc">${loc.desc}</div><div class="links">${lnk}</div>${loc.detail?'<div class="details" id="'+uid+'">'+loc.detail.replace(/\n/g,'<br>')+'</div>':''}${shopHtml}</div></div>`;
}
function renderDay(idx){
  const d=DAYS.find(x=>x.id===idx);if(!d)return'';
  let h=`<div class="day-head"><h2>${d.title}</h2><p>${d.date}</p></div>`;
  if(d.id===1)h+='<div class="route-bar"><strong>路线：</strong>酒店 → 芳华街 → 芳草街 → 玉林综合市场 → 玉林路</div>';
  if(d.id===2)h+='<div class="route-bar"><strong>路线：</strong>犀浦站 → 都江堰景区 → 灌县古城 → 南桥</div>';
  if(d.id===3)h+='<div class="route-bar"><strong>路线：</strong>都江堰 → 三星堆 → 返回成都 → 九眼桥廊桥</div>';
  if(d.id===4)h+='<div class="route-bar"><strong>路线：</strong>酒店 → 浣花溪公园 → 文化公园 → 芳华街 → 玉林路</div>';
  h+='<div class="timeline">';
  d.locations.forEach(l=>h+=locCard(l,idx));
  return h+'</div>';
}
let cur=0;
const tabsEl=document.getElementById('tabs'),contentEl=document.getElementById('content');
DAYS.forEach(d=>{const btn=document.createElement('button');btn.className='tab'+(d.id===0?' active':'');btn.dataset.day=d.id;btn.textContent=d.label;tabsEl.appendChild(btn)});
function go(idx){
  cur=idx;tabsEl.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',+t.dataset.day===idx));
  contentEl.innerHTML=idx===0?overviewContent():renderDay(idx);
  showDay(idx);contentEl.scrollTo({top:0});
}
function toggle(id){const el=document.getElementById(id);if(el)el.classList.toggle('show')}
tabsEl.addEventListener('click',e=>{const t=e.target.closest('.tab');if(t)go(+t.dataset.day)});
go(0);
const asOverlay=document.createElement('div');asOverlay.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.35);backdrop-filter:blur(2px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s';
asOverlay.innerHTML='<div style="width:100%;max-width:420px;padding:0 8px 34px"><div style="background:rgba(255,255,255,.88);backdrop-filter:blur(20px);border-radius:14px;overflow:hidden;margin-bottom:8px" id="as-opts"></div><div style="background:rgba(255,255,255,.88);backdrop-filter:blur(20px);border-radius:14px;overflow:hidden"><button style="display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;font-size:17px;color:#007aff;font-weight:600;border:none;background:none;width:100%;cursor:pointer" onclick="closeAS()">取消</button></div></div>';
document.body.appendChild(asOverlay);asOverlay.addEventListener('click',e=>{if(e.target===asOverlay)closeAS()});
function openAS(n,lat,lng){const enc=encodeURIComponent(n);document.getElementById('as-opts').innerHTML=`<button style="display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;font-size:17px;color:#007aff;font-weight:500;border:none;background:none;width:100%;cursor:pointer;border-bottom:.5px solid rgba(0,0,0,.12)" onclick="window.open('https://uri.amap.com/marker?position=${lng},${lat}&name=${enc}&src=trip&coordinate=wgs84&callnative=1');closeAS()">🧭 高德地图</button><button style="display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;font-size:17px;color:#007aff;font-weight:500;border:none;background:none;width:100%;cursor:pointer" onclick="window.open('https://map.baidu.com/search/${enc}');closeAS()">🗺️ 百度地图</button>`;asOverlay.style.opacity='1';asOverlay.style.pointerEvents='auto'}
function closeAS(){asOverlay.style.opacity='0';asOverlay.style.pointerEvents='none'}
</script>
